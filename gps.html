<!DOCTYPE html>
<html>
<head>
    <title>GPS Tracking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .back { position: absolute; top: 10px; left: 50px; z-index: 1000; background: #333; color: #0f0; padding: 10px; text-decoration: none; border-radius: 5px;}
    </style>
</head>
<body>
    <a href="/" class="back">⬅ Trở về</a>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([20.962650, 105.747150], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var marker = L.marker([20.962650, 105.747150]).addTo(map);
        var firstLoad = true;

        setInterval(() => {
            fetch('/api/gps_data').then(r => r.json()).then(d => {
                var pos = new L.LatLng(d.lat, d.lon);
                marker.setLatLng(pos);
                if(firstLoad) { map.setView(pos, 18); firstLoad = false; }
            });
        }, 2000); // 2 giây cập nhật 1 lần
    </script>
</body>
</html>
